name: CI
on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  # this builds the Docker container, if needed, then caches it to the GitHub
  # Container Registry, `ghcr.io`.
  #
  # it's pretty important that this works, as we use it to work on the Rover!
  build-docker-image:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker build tools
        uses: docker/setup-buildx-action@v3

      - name: Log in on GitHub's ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Add QEMU (for cross-arch building)
        uses: docker/setup-qemu-action@v3

      # make repo owner name (Sooner-Rover-Team) lowercase
      #
      # otherwise, we can't push to the ghcr.io directory!
      - name: Get lowercase org owner name
        run: |
          repo_lower=$(echo "${{ github.repository_owner }}" | awk '{print tolower($0)}')
          echo "ORGNAME=${repo_lower}" >> ${GITHUB_ENV}

      # see: https://docs.docker.com/build/ci/github-actions/cache/
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./docker
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64,linux/arm64
          cache-from: |
            type=registry,ref=ghcr.io/${{ env.ORGNAME }}/auto_ros2:latest
            type=inline
          cache-to: type=inline
          tags: ghcr.io/${{ env.ORGNAME }}/auto_ros2:latest

  check-ros2-workspace:
    # same as jetson :p
    runs-on: ubuntu-22.04
    container:
      image: osrf/ros:humble-simulation
    steps:
      # we'll install `node` on the "host" image if we're running on `act`...
      #
      # for more info, see: https://github.com/nektos/act/issues/973
      - name: Workaround for Act runner
        if: ${{ env.ACT }}
        run: apt update && apt install curl && curl -fsSL https://deb.nodesource.com/setup_22.x | bash && apt update && apt install -y nodejs

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: tecolicom/actions-use-apt-tools@v1
        with:
          tools: clang curl

      - run: |
          curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg
          echo "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_22.x nodistro main" | sudo tee /etc/apt/sources.list.d/nodesource.list

      - uses: tecolicom/actions-use-apt-tools@v1
        with:
          tools: nodejs

      # grab uv...
      - name: Get `uv` for Python
        uses: astral-sh/setup-uv@v5

      # ...and cargo
      - name: Set up Rust
        uses: moonrepo/setup-rust@v1
        with:
          components: clippy, rustfmt

      # grab a python binary
      - name: Set up Python
        run: uv python install

      # set up environment
      - name: Install the project
        run: uv sync

      # enter environment
      - run: . .venv/bin/activate

      # cache all our rosdep dependencies
      - name: Grab `rosdep` dependencies
        run: |
          # we're going to grab all the `rosdep` stuff and use a cache to speed
          # things up...
          #
          # first, we gotta update our repos. otherwise, we won't know what
          # pkgs are out of date
          apt update && rosdep update
          echo "completed repo updates"

          # make a list of each project in the workspace
          PROJECT_PATHS=$(colcon list --paths-only | tr '\n' ' ')
          echo "found workspace entry paths: $PROJECT_PATHS"

          # now, grab a list of the dependencies
          rosdep install --from-paths $PROJECT_PATHS -y -r --rosdistro humble -s > /tmp/rosdep.out
          echo "got system package manager dep list: $(cat /tmp/rosdep.out)"

          # let's parse the output!
          #
          # there isn't any way to get dependencies from rosdep directly, so we
          # need to remove the `apt` stuff ourselves...
          cat /tmp/rosdep.out | grep 'apt-get' | sed 's/^.*apt-get install -y //' | xargs > /tmp/parsed_rosdep.out
          echo "got the following dependencies: $(cat /tmp/parsed_rosdep.out)"

          echo "current directory: $(pwd)"
          echo
          echo "listing: $(ls)"
          echo

          # save that into a variable in the workflow
          echo "ROSDEP_PKGS=$(cat /tmp/parsed_rosdep.out)" >> $GITHUB_ENV
          echo "saved into workflow"

      # install these based on the cache
      - uses: tecolicom/actions-use-apt-tools@v1
        if: env.ROSDEP_PKGS != ''
        with:
          tools: ${{ env.ROSDEP_PKGS }}

      # build the entire ROS 2 workspace just to ensure things work.
      #
      # this'll use colcon
      - name: Build ROS 2 workspace
        shell: bash
        run: |
          . .venv/bin/activate
          . /opt/ros/humble/setup.bash
          just build

      - name: Run ROS 2 tests
        shell: bash
        run: |
          . .venv/bin/activate
          . /opt/ros/humble/setup.bash
          . install/local_setup.bash
          just test

  lint-python:
    runs-on: ubuntu-22.04
    container:
      image: osrf/ros:humble-simulation
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # install node real quick
      - run: sudo apt-get update && sudo apt-get install -y curl && curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash - && sudo apt-get install -y nodejs

      # grab uv
      - uses: astral-sh/setup-uv@v5

      # grab a python binary
      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: clang

      # set up environment
      - name: Install the project
        run: |
          uv sync --all-extras --dev
          . .venv/bin/activate

      # check python lints
      - name: Lint (Python)
        run: uv tool run ruff check

  format-python:
    runs-on: ubuntu-22.04
    container:
      image: osrf/ros:humble-simulation
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # install node real quick
      - run: sudo apt-get update && sudo apt-get install -y curl && curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash - && sudo apt-get install -y nodejs

      # grab uv
      - uses: astral-sh/setup-uv@v5

      # grab a python binary
      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: clang

      # set up environment
      - name: Install the project
        run: |
          uv sync --all-extras --dev
          . .venv/bin/activate

      # check python lints
      - name: Format with Ruff (Python)
        run: uv tool run ruff format --check

  lint-rust:
    runs-on: ubuntu-22.04
    container:
      image: osrf/ros:humble-simulation
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: sudo apt-get update && sudo apt-get install -y curl && curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash - && sudo apt-get install -y nodejs

      - uses: moonrepo/setup-rust@v1
        with:
          components: clippy, rustfmt
          bins: cargo-nextest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # run rust lints
      - name: Lint with Clippy (Rust)
        run: cargo clippy --workspace

  test-rust:
    runs-on: ubuntu-22.04
    container:
      image: osrf/ros:humble-simulation
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: sudo apt-get update && sudo apt-get install -y curl && curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash - && sudo apt-get install -y nodejs

      - uses: moonrepo/setup-rust@v1
        with:
          components: clippy, rustfmt
          bins: cargo-nextest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # run tests
      - name: Test with Nextest (Rust)
        run: cargo nextest run --test-threads 1 --no-fail-fast

  format-rust:
    runs-on: ubuntu-22.04
    container:
      image: osrf/ros:humble-simulation
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: sudo apt-get update && sudo apt-get install -y curl && curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash - && sudo apt-get install -y nodejs

      - uses: moonrepo/setup-rust@v1
        with:
          components: clippy, rustfmt
          bins: cargo-nextest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # run the formatter
      - name: Format with `rustfmt` (Rust)
        run: cargo fmt --check
